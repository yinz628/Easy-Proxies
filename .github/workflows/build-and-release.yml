name: Build and Release

on:
  push:
    tags:
      - 'v*' # 仅当推送形如 v1.0.0 的 tag 时触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发

jobs:
  build-binaries:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Linux Binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w" -tags "with_utls with_quic with_grpc with_wireguard with_gvisor" -o easy-proxies-linux-amd64 ./cmd/easy_proxies

      - name: Build Windows Binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w" -tags "with_utls with_quic with_grpc with_wireguard with_gvisor" -o easy-proxies-windows-amd64.exe ./cmd/easy_proxies

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            easy-proxies-linux-amd64
            easy-proxies-windows-amd64.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') # 只有打 tag 的时候才创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            easy-proxies-linux-amd64
            easy-proxies-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}